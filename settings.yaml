backend:
  default: "native_dbpoweramp"        # "wine_dbpoweramp" | "native_ffmpeg" — used if --backend not passed
  auto_detect: true               # auto-detect Windows vs Wine environment (Windows=native_dbpoweramp, Linux/Mac=Wine)
  native_dbpoweramp:
    coreconverter_path: "C:\\Program Files\\dBpoweramp\\CoreConverter.exe"
    # Enable Windows long-path workaround via tmp staging. When true, the
    # wrapper copies each conversion's source to ./tmp/audio/src/<hash>__
    # <basename>, points CoreConverter at ./tmp/audio/dst/<hash>__<basename>
    # for the output, and moves the converted file back to the long
    # destination on success. Required if any of your source/destination
    # paths are deeply nested (e.g. JP album folders with kanji + Roman
    # artist/album names routinely exceed MAX_PATH=260). Without this,
    # CoreConverter cannot open the file and the conversion fails with
    # "Error writing audio data to StdIn Pipe" plus a 0-byte output.
    # Staging kicks in only when the path exceeds ~240 chars, so short
    # paths pay no I/O cost. Override at runtime with --tmp-staging /
    # --no-tmp-staging.
    tmp_staging: true
  wine_dbpoweramp:
    wine_binary: "wine"
    wine_prefix: "~/.wine-dbpoweramp"          # WINEPREFIX env var value
    coreconverter_path: "C:\\Program Files\\dBpoweramp\\CoreConverter.exe"
    winepath_binary: "winepath"

  native_ffmpeg:
    ffmpeg_binary: "ffmpeg"
    flac_binary: "flac"            # used only if a preset prefers the standalone flac CLI
    lame_binary: "lame"            # used only if a preset prefers the standalone lame CLI
    opusenc_binary: "opusenc"      # used only if a preset prefers the standalone opusenc CLI

tools: {}  # mutagen is used for audio metadata; no external binaries needed

history:
  db_path: "conversion_history.db"

execution:
  default_workers: 4               # conversion pool size
  probe_workers: 16                # mutagen probe pool size (pure I/O, can be higher)
  worker_model: "thread"           # "thread" | "process"
  execution_mode: "hybrid"         # "hybrid" | "phased" (phased = skip → copy → convert)

logging:
  level: "INFO"                    # DEBUG | INFO | WARNING | ERROR
