<header class="shell__header">
  <div class="header__inner">
    <a class="header__brand" href="{{ '/' | relative_url }}">
      <span class="header__mark">dB</span>
      <span class="header__wordmark">dBpoweramp Wrapper</span>
    </a>

    <nav class="header__nav" aria-label="Sections">
      {%- for section in site.data.navigation -%}
        <a class="header__nav-item{% if page.category == section.slug %} is-active{% endif %}"
           href="{{ section.entries[0].url | relative_url }}">
          {{ section.title }}
        </a>
      {%- endfor -%}
    </nav>

    <div class="header__actions">
      <button class="header__cmd" type="button"
              data-cmdk-open
              aria-label="Open command palette (Ctrl/Cmd-K)">
        <kbd>Ctrl</kbd><kbd>K</kbd>
      </button>
      <button class="header__theme" type="button"
              data-theme-toggle
              aria-label="Toggle dark mode">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </div>
</header>
