<aside class="shell__left sidebar" aria-label="Section navigation">
  {%- for section in site.data.navigation -%}
    <details class="sidebar__group"{% if page.category == section.slug %} open{% endif %}>
      <summary class="sidebar__group-label">{{ section.title }}</summary>
      <ul class="sidebar__list">
        {%- for entry in section.entries -%}
          <li>
            <a class="sidebar__item{% if page.url == entry.url %} is-active{% endif %}"
               href="{{ entry.url | relative_url }}">
              {{ entry.title }}
            </a>
          </li>
        {%- endfor -%}
      </ul>
    </details>
  {%- endfor -%}
</aside>
