<div class="cmdk" data-cmdk hidden role="dialog" aria-modal="true" aria-label="Search">
  <div class="cmdk__backdrop" data-cmdk-close></div>
  <div class="cmdk__panel">
    <input type="search" class="cmdk__input"
           data-cmdk-input
           placeholder="Search docs…  (press Esc to close)"
           autocomplete="off"
           spellcheck="false">
    <ul class="cmdk__results" data-cmdk-results></ul>
    <p class="cmdk__hint">
      <kbd>↑</kbd><kbd>↓</kbd> to navigate, <kbd>↵</kbd> to open, <kbd>Esc</kbd> to close.
    </p>
  </div>
</div>
