baseURL: https://5509346169.github.io/wrapper_dbpoweramp/
locale: en-us
title: dBpoweramp Wrapper
disableKinds: [RSS, taxonomy]

params:
  repo: 5509346169/wrapper_dbpoweramp
  tagline: Audiophile-grade audio conversion, on your terms.
  theme:
    fonts:
      display: Bodoni Moda
      body: Geist
      mono: JetBrains Mono
    palette:
      light:
        paper: "#f6f4ee"
        ink: "#1a1d21"
        ink_soft: "#4a4f55"
        rule: "#d9d4c6"
        accent: "#2a7ea4"
        accent_warm: "#c08a3e"
      dark:
        paper: "#0f1216"
        ink: "#ece8df"
        ink_soft: "#a8a59b"
        rule: "#2a2e34"
        accent: "#6fc1d4"
        accent_warm: "#d8a85c"

outputs:
  home: [HTML, JSON]
  page: [HTML]

markup:
  goldmark:
    renderer:
      unsafe: true

theme: [hugo-audiophile]
