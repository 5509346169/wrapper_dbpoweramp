name: Deploy docs site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - _docs_site/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Jekyll site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          working-directory: _docs_site
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: _docs_site/package-lock.json

      - name: Install npm dependencies
        working-directory: _docs_site
        run: npm ci

      - name: Bundle vendor JS (no CDN)
        working-directory: _docs_site
        run: npm run vendor

      - name: Jekyll build (strict front-matter)
        working-directory: _docs_site
        run: bundle exec jekyll build --destination _site --trace --strict_front_matter

      - name: Copy _site/ to site/ for Pages artifact
        working-directory: _docs_site
        run: node scripts/copy-site.mjs

      - name: CDN guard — fail if any https:// survives
        working-directory: _docs_site
        run: node scripts/check-no-cdn.mjs site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _docs_site/site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
