name: Deploy docs site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - _docs_site/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Hugo site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.139"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: _docs_site/package-lock.json

      - name: Install npm dependencies
        working-directory: _docs_site
        run: npm ci

      - name: CSS + JS bundle
        working-directory: _docs_site
        run: npm run css && npm run vendor

      - name: Hugo build
        working-directory: _docs_site
        run: hugo --gc --minify --environment production

      - name: CDN guard — fail if any https:// survives
        working-directory: _docs_site
        run: node scripts/check-no-cdn.mjs public

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _docs_site/public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
