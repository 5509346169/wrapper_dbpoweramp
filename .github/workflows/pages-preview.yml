name: Docs preview

on:
  pull_request:
    branches:
      - main
    paths:
      - _docs_site/**
      - .github/workflows/pages-preview.yml

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build Hugo site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.139"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: _docs_site/package-lock.json

      - name: Install npm dependencies
        working-directory: _docs_site
        run: npm ci

      - name: CSS + JS bundle
        working-directory: _docs_site
        run: npm run css && npm run vendor

      - name: Hugo build
        working-directory: _docs_site
        run: hugo --gc --minify --environment production

      - name: CDN guard — fail if any https:// survives
        working-directory: _docs_site
        run: node scripts/check-no-cdn.mjs public

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _docs_site/public

  comment:
    name: Post preview URL
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Docs site built green. Artifact ready for review.',
            })
