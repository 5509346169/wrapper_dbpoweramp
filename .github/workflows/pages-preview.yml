name: Docs preview

on:
  pull_request:
    branches:
      - main
    paths:
      - _docs_site/**
      - .github/workflows/pages-preview.yml

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build Jekyll site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          working-directory: _docs_site
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: _docs_site/package-lock.json

      - name: Install npm dependencies
        working-directory: _docs_site
        run: npm ci

      - name: Bundle vendor JS (no CDN)
        working-directory: _docs_site
        run: npm run vendor

      - name: Jekyll build (strict front-matter)
        working-directory: _docs_site
        run: bundle exec jekyll build --destination _site --trace --strict_front_matter

      - name: Copy _site/ to site/ for Pages artifact
        working-directory: _docs_site
        run: node scripts/copy-site.mjs

      - name: CDN guard — fail if any https:// survives
        working-directory: _docs_site
        run: node scripts/check-no-cdn.mjs site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _docs_site/site

  comment:
    name: Post preview URL
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Docs site built green. Artifact ready for review.',
            })
